global:
  domain: "argo.{{ .Values.ingress.baseDomain }}"
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
configs:
  params:
    server.insecure: true
  secret:
    createSecret: false
  cm:
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      if obj.spec ~= nil and obj.spec.rules ~= nil and #obj.spec.rules > 0 then
        hs.status = "Healthy"
        hs.message = "Ingress is healthy"
      else
        hs.status = "Degraded"
        hs.message = "Ingress has no rules defined"
      end
      return hs
server:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer.internal }}
    extraTls:
      - hosts:
        - "argo.{{ .Values.ingress.baseDomain }}"
        secretName: argo-cd-tls
